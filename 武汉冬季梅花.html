<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>武汉冬日梅花赏景地图</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --plum-deep: #6b1f3a;
      --plum-mid:  #c2185b;
      --plum-light:#f8bbd0;
      --gold:      #c9a84c;
      --ink:       #1a0a10;
      --paper:     #fdf6f0;
      --fog:       rgba(253,246,240,0.92);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--ink);
      height: 100vh;
      overflow: hidden;
    }

    /* 高德底图滤镜：淡化饱和度，偏暖色 */
    .leaflet-tile {
      filter: grayscale(35%) brightness(108%) contrast(92%) saturate(80%) sepia(8%);
    }

    /* ── 顶部标题栏 ── */
    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1100;
      background: linear-gradient(135deg, var(--plum-deep) 0%, #3a0a20 100%);
      border-bottom: 2px solid var(--gold);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .header-plum { font-size: 2.2rem; line-height: 1; }
    #header h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.6rem; color: var(--paper);
      letter-spacing: 0.12em; line-height: 1.1;
    }
    #header p { font-size: 0.72rem; color: var(--plum-light); letter-spacing: 0.08em; margin-top: 3px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .season-badge {
      background: rgba(194,24,91,0.25); border: 1px solid var(--plum-mid);
      border-radius: 20px; padding: 4px 12px; color: var(--plum-light); font-size: 0.72rem;
    }

    /* ── 地图容器 ── */
    #map {
      position: absolute;
      top: 72px; bottom: 0; left: 0; right: 0;
    }

    /* ── 筛选栏（在地图内，不遮标题） ── */
    #filter {
      position: absolute;
      /* top从地图顶部算，即header以下 */
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .filter-btn {
      background: rgba(253,246,240,0.92); border: 1.5px solid var(--gold);
      border-radius: 20px; padding: 6px 16px;
      font-family: 'Noto Serif SC', serif; font-size: 0.73rem;
      color: var(--plum-deep); cursor: pointer; transition: all 0.2s;
      backdrop-filter: blur(6px); white-space: nowrap;
      box-shadow: 0 2px 8px rgba(107,31,58,0.15);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--plum-mid); color: #fff; border-color: var(--plum-mid);
    }

    /* ── 统计侧边栏 ── */
    #stats {
      position: absolute;
      top: 82px; left: 16px;
      z-index: 1000;
      background: var(--fog); border: 1.5px solid var(--gold);
      border-radius: 12px; padding: 16px 18px; width: 170px;
      box-shadow: 0 8px 32px rgba(107,31,58,0.2); backdrop-filter: blur(8px);
    }
    #stats h3 {
      font-family: 'Ma Shan Zheng', cursive; font-size: 0.95rem;
      color: var(--plum-deep); margin-bottom: 12px; letter-spacing: 0.08em;
    }
    .stat-item { margin: 8px 0; display: flex; flex-direction: column; }
    .stat-num { font-size: 1.6rem; font-weight: 600; color: var(--plum-mid); line-height: 1; }
    .stat-desc { font-size: 0.65rem; color: #888; margin-top: 2px; }
    .divider { border: none; border-top: 1px solid var(--plum-light); margin: 10px 0; }

    /* ── 图例面板 ── */
    #legend {
      position: absolute;
      bottom: 36px; right: 20px;
      z-index: 1000;
      background: var(--fog); border: 1.5px solid var(--gold);
      border-radius: 12px; padding: 18px 20px; width: 220px;
      box-shadow: 0 8px 32px rgba(107,31,58,0.25); backdrop-filter: blur(8px);
    }
    #legend h3 {
      font-family: 'Ma Shan Zheng', cursive; font-size: 1rem; color: var(--plum-deep);
      border-bottom: 1px solid var(--plum-light); padding-bottom: 8px;
      margin-bottom: 12px; letter-spacing: 0.1em;
    }
    .legend-section { margin-bottom: 14px; }
    .legend-label { font-size: 0.68rem; color: #888; letter-spacing: 0.05em; margin-bottom: 6px; }
    .scale-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .scale-circle {
      border-radius: 50%; background: rgba(194,24,91,0.18);
      border: 2px solid var(--plum-mid); flex-shrink: 0;
    }
    .scale-text { font-size: 0.72rem; color: var(--ink); }
    .district-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .district-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .district-name { font-size: 0.72rem; color: var(--ink); }

    /* ── 标记：圆圈 ── */
    .plum-marker {
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: 2.5px solid;
      font-size: 1.1rem; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 14px rgba(107,31,58,0.35);
      position: relative;
    }
    .plum-marker:hover {
      transform: scale(1.2);
      box-shadow: 0 6px 20px rgba(107,31,58,0.55);
    }

    /* ── 标记：脉冲动画 ── */
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .pulse-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid currentColor;
      animation: pulse-ring 2.2s ease-out infinite;
      pointer-events: none;
    }

    /* ── 标记：名称标签 ── */
    .marker-label {
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--ink);
      background: rgba(253,246,240,0.92);
      border: 1px solid var(--gold);
      border-radius: 6px;
      padding: 2px 7px;
      box-shadow: 0 2px 8px rgba(107,31,58,0.18);
      pointer-events: none;
      letter-spacing: 0.04em;
      backdrop-filter: blur(4px);
    }

    /* ── 弹窗定制 ── */
    .leaflet-popup-content-wrapper {
      background: var(--paper) !important;
      border: 1.5px solid var(--gold) !important;
      border-radius: 14px !important;
      box-shadow: 0 12px 40px rgba(107,31,58,0.3) !important;
      padding: 0 !important;
      min-width: 240px;
    }
    .leaflet-popup-tip { background: var(--paper) !important; }
    .leaflet-popup-content { margin: 0 !important; }
    .popup-inner { padding: 0; overflow: hidden; border-radius: 12px; }
    .popup-header {
      background: linear-gradient(135deg, var(--plum-deep), #9c1550);
      color: var(--paper); padding: 14px 18px 12px;

    .popup-header h2 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.25rem; letter-spacing: 0.08em;

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    .info-card .val { font-size: 1.1rem; font-weight: 600; color: var(--plum-deep); }
    .info-card .key { font-size: 0.65rem; color: #999; margin-top: 2px; }

    .bloom-bar-label { display: flex; justify-content: space-between; font-size: 0.68rem; color: #888; margin-bottom: 4px; }
    .bloom-bar-bg { height: 6px; background: #f0d8e2; border-radius: 3px; overflow: hidden; }

      height: 100%; background: linear-gradient(90deg, var(--plum-mid), var(--gold));

    .leaflet-control-scale-line {
      border-color: var(--plum-mid) !important;
      color: var(--plum-deep) !important;
      font-size: 0.65rem !important;
      background: rgba(253,246,240,0.85) !important;
      padding: 1px 5px !important;
    }
  </style>
</head>

<div id="header">

<!-- 筛选按钮（绝对定位，top从视口算，72px标题高+10px间距） -->
<div id="filter">

</div>

<!-- 统计面板 -->
<div id="stats">
  <h3>📊 总览</h3>
  <div class="stat-item">
    <span class="stat-num" id="stat-count">10</span>
    <span class="stat-desc">赏梅景点</span>
  </div>

  <div class="stat-item">

</div>

<div id="map"></div>

<!-- 图例 -->

  <div class="legend-section">
    <div class="legend-label">■ 分级设色 — 所属区域</div>

    <div class="district-row"><div class="district-dot" style="background:#7b3fa0;"></div><span class="district-name">武昌区</span></div>
    <div class="district-row"><div class="district-dot" style="background:#1976d2;"></div><span class="district-name">汉阳区</span></div>
    <div class="district-row"><div class="district-dot" style="background:#00897b;"></div><span class="district-name">东西湖区</span></div>

  <div class="legend-section" style="margin-bottom:0">

  </div>
</div>

// 绘制双层边界线
wuhanBoundary.forEach(function(ring) {
  L.polygon(ring, {color:"#d4687c", weight:3, opacity:0.8, fillColor:"transparent", fillOpacity:0}).addTo(map);
  L.polygon(ring, {color:"#f0a0b8", weight:1.5, opacity:0.5, fillColor:"transparent", fillOpacity:0}).addTo(map);
});

// ── 创建标记 ──
let allMarkers = [];

spots.forEach(s => {
  const r = scaleRadius(s.area);
  const color = districtColor[s.district] || "#888";

  // 图标HTML：圆圈 + 脉冲环 + 名称标签
  const icon = L.divIcon({
    className: '',
    html: `
      <div class="plum-marker" style="
        width:${r*2}px; height:${r*2}px;
        background:${color}28;
        border-color:${color};
        color:${color};
      ">
        <div class="pulse-ring" style="color:${color};"></div>
        🌸
        <div class="marker-label" style="color:${color}; border-color:${color}55;">${s.name}</div>
      </div>`,
    iconSize: [r*2, r*2],
    iconAnchor: [r, r],
    popupAnchor: [0, -r - 20],
  });

  const popupHtml = `
    <div class="popup-inner">
      <div class="popup-header">
        <div class="popup-icon">🌸</div>
        <h2>${s.name}</h2>
        <div class="popup-sub">${s.district} · ${s.scale}</div>
      </div>
      <div class="popup-body">
        <div class="info-grid">
          <div class="info-card">
            <div class="val">${s.area}<small style="font-size:0.7rem;font-weight:400">亩</small></div>
            <div class="key">景区面积</div>
          </div>
          <div class="info-card">
            <div class="val">${s.varieties}<small style="font-size:0.7rem;font-weight:400">种</small></div>
            <div class="key">梅花品种</div>
          </div>
        </div>
        <div class="info-row">📅 <b>最佳花期：</b>${s.bestMonth}</div>
        <div class="info-row">🎫 <b>门票：</b>${s.admission}</div>
        <div class="info-row">${s.features.map(f=>`<span class="tag">${f}</span>`).join(' ')}</div>
        <div class="bloom-bar-wrap">
          <div class="bloom-bar-label"><span>观赏指数</span><span>${s.bloom}%</span></div>
          <div class="bloom-bar-bg"><div class="bloom-bar-fill" style="width:${s.bloom}%"></div></div>
        </div>
      </div>
    </div>`;

  const marker = L.marker([s.lat, s.lng], { icon });
  // marker.bindPopup(popupHtml, { maxWidth: 280, minWidth: 240 }); // 弹窗已关闭

  // 点击弹窗时地图轻微平移居中
  // marker.on('click', function() { // 弹窗已关闭
    const latlng = marker.getLatLng();
    // 稍微往上偏移，让弹窗不被遮
  //   map.panTo([latlng.lat - 0.005, latlng.lng], { animate: true, duration: 0.4 });
//  });

  marker._spotData = s;
  marker.addTo(map);
  allMarkers.push(marker);
});

// ── 筛选 ──
function filterDistrict(district, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let count = 0;
  allMarkers.forEach((m, i) => {
    const s = spots[i];
    const show = district === '全部' || s.district === district;
    if (show) { if (!map.hasLayer(m)) m.addTo(map); count++; }
    else       { if (map.hasLayer(m))  map.removeLayer(m); }
  });
  document.getElementById('stat-count').textContent = count;

  if (district !== '全部') {
    const visible = spots.filter(s => s.district === district);
    if (visible.length) {
      const lats = visible.map(s => s.lat), lngs = visible.map(s => s.lng);
      map.fitBounds(
        [[Math.min(...lats)-0.02, Math.min(...lngs)-0.02],
         [Math.max(...lats)+0.02, Math.max(...lngs)+0.02]],
        { padding:[60,60] }
      );
    }
  } else {
    map.setView([30.5610, 114.3050], 11);
  }
}
