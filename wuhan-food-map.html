<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武汉美食地图</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f8f5;--card:#ffffff;--ink:#4a5048;--accent:#6e9b7e;--accent2:#93b89e;--accent3:#b8d5c0;--border:#dde5db;--tag:#eef5ee;--shadow:rgba(100,130,110,0.07);--shadow-sm:rgba(100,130,110,0.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC",serif;background:var(--bg);height:100vh;overflow:hidden}
#topbar{position:relative;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:10px 22px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px var(--shadow-sm)}
#topbar h1{font-family:"Ma Shan Zheng",cursive;font-size:1.5rem;color:var(--accent);letter-spacing:.08em;font-weight:400}
#topbar .sub{font-size:.68rem;color:#8a9c8e}
#search-wrap{margin-left:auto;position:relative;display:flex;align-items:center}
#search-box{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:7px 16px 7px 36px;color:var(--ink);font-size:.8rem;width:220px;outline:none;font-family:inherit;transition:.25s}
#search-box:focus{border-color:var(--accent);width:280px;box-shadow:0 0 0 3px rgba(110,155,126,0.08)}
#search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.45;font-size:.85rem}
#map-wrap{display:flex;height:calc(100vh - 56px);position:relative}
#map{flex:1;width:100%;height:100%}
#left-panel{position:absolute;top:12px;left:14px;z-index:1000;width:178px;max-height:calc(100vh - 100px);overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 15px;box-shadow:0 2px 16px var(--shadow)}
#left-panel h3{font-family:"Ma Shan Zheng",cursive;font-size:.82rem;color:var(--accent);margin:5px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--border);font-weight:400}
.stat-row{display:flex;justify-content:space-between;font-size:.67rem;color:#829085;margin:3px 0}
.stat-row .val{color:var(--accent);font-weight:600;font-size:.82rem}
.dist-btn{display:block;width:100%;text-align:left;background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 10px;margin:3px 0;color:var(--ink);font-size:.67rem;cursor:pointer;font-family:inherit;transition:.15s}
.dist-btn:hover{background:var(--tag);border-color:var(--accent2);transform:translateX(2px)}
.dist-btn span{float:right;background:var(--tag);border-radius:10px;padding:1px 7px;font-size:.6rem;color:var(--accent)}
#cat-filter{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:55%}
.cat-btn{--c:#93b89e;background:rgba(255,255,255,.96);border:1.5px solid var(--c);border-radius:14px;padding:4px 10px;font-size:.64rem;color:var(--ink);cursor:pointer;font-family:inherit;transition:.18s;white-space:nowrap}
.cat-btn:hover,.cat-btn.active{background:var(--c);color:#fff}
.cat-btn span{background:rgba(255,255,255,.22);border-radius:10px;padding:1px 6px;font-size:.58rem;margin-left:2px}
#legend{position:absolute;bottom:26px;right:16px;z-index:1000;background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:0 2px 16px var(--shadow);max-height:55vh;overflow-y:auto}
#legend h3{font-family:"Ma Shan Zheng",cursive;font-size:.78rem;color:var(--accent);margin-bottom:5px;font-weight:400}
.leg-row{display:flex;align-items:center;gap:6px;font-size:.6rem;color:#7a8a7e;margin:3px 0;white-space:nowrap}
.leg-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6);flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
#left-panel::-webkit-scrollbar,#legend::-webkit-scrollbar{width:3px}
#left-panel::-webkit-scrollbar-thumb,#legend::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){#left-panel{display:none}#cat-filter{top:10px;left:8px;right:8px;transform:none;max-width:100%}}
</style>
</head>

setTimeout(function(){

function mkIcon(cat){var uri=ICONS[cat]||ICONS["综合餐饮"];return new BMapGL.Icon(uri,new BMapGL.Size(24,24),{anchor:new BMapGL.Size(12,12)});}
function ipop(s){return '<div style="padding:0;border-radius:12px;overflow:hidden;min-width:240px;background:#fff;font-family:Noto Serif SC,serif;box-shadow:0 4px 20px rgba(100,120,100,0.12)"><div style="background:linear-gradient(135deg,#f8faf7,#eef5ee);padding:14px 16px 10px;text-align:center;border-bottom:1px solid #dde5db"><div style="font-family:Ma Shan Zheng,cursive;font-size:1.1rem;color:#6e9b7e;font-weight:400">'+s.n+'</div><div style="font-size:.66rem;color:#8a9c8e;margin-top:2px">'+s.c+' · '+s.d+'</div></div><div style="padding:12px 16px"><div style="font-size:.7rem;color:#4a5048;margin:5px 0">📍 '+s.a+'</div><div style="font-size:.7rem;color:#4a5048;margin:5px 0">💰 人均 ¥'+s.pr+'</div><div style="font-size:.7rem;color:#4a5048;margin:5px 0">⭐ 评分 '+(s.rt||"暂无")+'</div></div></div>';}

var all=[],acat="全部",stxt="";
function render(list){
  all.forEach(function(x){m.removeOverlay(x)});all=[];
  list.forEach(function(s){
    var mk=new BMapGL.Marker(new BMapGL.Point(s.lng,s.lat),{icon:mkIcon(s.c)});
    mk.addEventListener("click",function(){mk.openInfoWindow(new BMapGL.InfoWindow(ipop(s),{width:260}));m.panTo(new BMapGL.Point(s.lng,s.lat-0.003));});
    m.addOverlay(mk);all.push(mk);
  });
  document.getElementById("total-count").textContent=list.length;
}
render(spots);

var cats={},dists={};
spots.forEach(function(s){cats[s.c]=(cats[s.c]||0)+1;dists[s.d]=(dists[s.d]||0)+1;});
var sortedCats=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];});
var cbHtml="",legHtml="",dbHtml="";
sortedCats.forEach(function(c){var clr=spots.find(function(s){return s.c===c;}).co;cbHtml+='<button class="cat-btn" onclick="filterCat(\''+c+'\',this)" style="--c:'+clr+'">'+c+'<span>'+cats[c]+'</span></button>';legHtml+='<div class="leg-row"><span class="leg-dot" style="background:'+clr+';"></span> '+c+'</div>';});
var dc={"江岸区": [114.3, 30.61], "江汉区": [114.28, 30.6], "硚口区": [114.23, 30.58], "汉阳区": [114.25, 30.55], "武昌区": [114.32, 30.55], "青山区": [114.4, 30.63], "洪山区": [114.36, 30.52], "东西湖区": [114.15, 30.63], "汉南区": [114.08, 30.31], "蔡甸区": [114.05, 30.49], "江夏区": [114.33, 30.38], "黄陂区": [114.4, 31.0], "新洲区": [114.8, 30.85]};
Object.keys(dc).forEach(function(d){if(dists[d])dbHtml+='<button class="dist-btn" onclick="zoomDistrict(\''+d+'\')">'+d+'<span>'+dists[d]+'</span></button>';});
document.getElementById("cat-btns").innerHTML=cbHtml;
document.getElementById("leg-content").innerHTML=legHtml;
document.getElementById("dist-btns").innerHTML=dbHtml;

function doSearch(){stxt=document.getElementById("search-box").value.toLowerCase().trim();apply();}
function filterCat(cat,btn){document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.remove("active");});if(btn)btn.classList.add("active");acat=cat;apply();}
function apply(){var f=spots;if(acat!=="全部")f=f.filter(function(s){return s.c===acat;});if(stxt)f=f.filter(function(s){return s.n.toLowerCase().indexOf(stxt)!==-1||s.c.toLowerCase().indexOf(stxt)!==-1||s.a.toLowerCase().indexOf(stxt)!==-1||s.d.indexOf(stxt)!==-1;});render(f);if(f.length&&f.length<50)m.setViewport(f.map(function(s){return new BMapGL.Point(s.lng,s.lat);}),{margins:[40,40,40,40]});}
function zoomDistrict(d){if(d==="全部"){m.centerAndZoom(new BMapGL.Point(114.30,30.58),11);return;}var c=dc[d];if(c)m.centerAndZoom(new BMapGL.Point(c[0],c[1]),14);}
